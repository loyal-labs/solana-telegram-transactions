name: Extension CI
on:
  push:
    paths: ["extension/**", "packages/wallet-core/**"]
  pull_request:
    paths: ["extension/**", "packages/wallet-core/**"]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:solana-packages
      - run: cd packages/wallet-core && bun run typecheck && bun run build
      - id: version
        run: echo "v=$(jq -r .version extension/package.json)" >> "$GITHUB_OUTPUT"
      - run: cd extension && bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: loyal-ext-universal-v${{ steps.version.outputs.v }}
          path: extension/.output/chrome-mv3/
      - run: cd extension && bun run build:firefox
      - uses: actions/upload-artifact@v4
        with:
          name: loyal-ext-firefox-v${{ steps.version.outputs.v }}
          path: extension/.output/firefox-mv2/
      - name: Create release
        if: github.ref == 'refs/heads/main'
        run: |
          cd extension/.output
          zip -r loyal-ext-universal-v${{ steps.version.outputs.v }}.zip chrome-mv3/
          zip -r loyal-ext-firefox-v${{ steps.version.outputs.v }}.zip firefox-mv2/
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ext-v${{ steps.version.outputs.v }}
          name: Extension v${{ steps.version.outputs.v }}
          make_latest: false
          files: |
            extension/.output/loyal-ext-universal-v${{ steps.version.outputs.v }}.zip
            extension/.output/loyal-ext-firefox-v${{ steps.version.outputs.v }}.zip
